<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pinnacle Meld Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --felt: #1a3a2a;
    --felt-light: #214d38;
    --felt-dark: #0f2218;
    --gold: #c9a84c;
    --gold-light: #e8c96a;
    --cream: #f5eedc;
    --red: #c0392b;
    --red-dark: #96281b;
    --ink: #1a1008;
    --card: #fdf8ef;
    --shadow: rgba(0,0,0,0.5);
  }

  body {
    min-height: 100vh;
    background: var(--felt-dark);
    background-image:
      radial-gradient(ellipse at 30% 20%, rgba(30,80,50,0.6) 0%, transparent 60%),
      radial-gradient(ellipse at 70% 80%, rgba(10,40,20,0.8) 0%, transparent 60%),
      repeating-linear-gradient(
        45deg,
        transparent,
        transparent 10px,
        rgba(255,255,255,0.015) 10px,
        rgba(255,255,255,0.015) 20px
      );
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Courier Prime', monospace;
    padding: 20px;
  }

  .table-cloth {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(255,255,255,0.02) 2px, rgba(255,255,255,0.02) 4px
    ),
    repeating-linear-gradient(
      90deg, transparent, transparent 2px,
      rgba(255,255,255,0.02) 2px, rgba(255,255,255,0.02) 4px
    );
    pointer-events: none;
  }

  .card-wrapper {
    position: relative;
    width: 100%;
    max-width: 520px;
    animation: dealIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }

  @keyframes dealIn {
    from { opacity: 0; transform: translateY(-40px) rotate(-2deg); }
    to   { opacity: 1; transform: translateY(0) rotate(0deg); }
  }

  .card-wrapper::before,
  .card-wrapper::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--card);
    border-radius: 12px;
    box-shadow: 0 8px 40px var(--shadow);
  }
  .card-wrapper::before { transform: rotate(-2deg) translateY(4px); z-index: 0; }
  .card-wrapper::after  { transform: rotate(1.5deg) translateY(2px); z-index: 1; }

  .card {
    position: relative;
    z-index: 2;
    background: var(--card);
    border-radius: 12px;
    box-shadow: 0 20px 60px var(--shadow), 0 2px 0 var(--gold);
    overflow: hidden;
    border: 1px solid rgba(201,168,76,0.3);
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 8px;
    border: 1.5px solid var(--gold);
    border-radius: 8px;
    opacity: 0.5;
    pointer-events: none;
    z-index: 10;
  }

  .card-header {
    background: var(--ink);
    padding: 24px 28px 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .card-header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold), var(--gold-light), var(--gold), transparent);
  }

  .suits-row {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 10px;
    font-size: 1.4rem;
    letter-spacing: 6px;
    color: var(--gold);
    animation: suitsPulse 3s ease-in-out infinite;
  }
  .suits-row .red-suit { color: var(--red); }

  @keyframes suitsPulse {
    0%, 100% { opacity: 0.8; }
    50% { opacity: 1; }
  }

  .card-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 900;
    color: var(--cream);
    letter-spacing: 4px;
    text-transform: uppercase;
    line-height: 1;
  }

  .card-header h1 span { color: var(--gold); }

  .subtitle {
    font-size: 0.65rem;
    color: rgba(245,238,220,0.5);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .card-body { padding: 28px 32px 32px; }

  .field-group { margin-bottom: 20px; }

  label {
    display: block;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--felt-dark);
    margin-bottom: 6px;
    opacity: 0.7;
  }

  .input-row {
    display: flex;
    align-items: center;
    border: 2px solid rgba(26,58,42,0.25);
    border-radius: 6px;
    overflow: hidden;
    background: white;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-row:focus-within {
    border-color: var(--felt);
    box-shadow: 0 0 0 3px rgba(26,58,42,0.12);
  }

  .input-icon {
    padding: 0 12px;
    font-size: 1.1rem;
    background: rgba(26,58,42,0.06);
    border-right: 1px solid rgba(26,58,42,0.12);
    height: 46px;
    display: flex;
    align-items: center;
    color: var(--felt);
  }

  input[type="number"] {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    font-family: 'Playfair Display', serif;
    font-size: 1.35rem;
    font-weight: 700;
    color: var(--ink);
    padding: 8px 14px;
    width: 100%;
  }

  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { opacity: 0.4; }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 24px 0;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.4), transparent);
  }

  .divider-diamond { color: var(--gold); font-size: 0.8rem; opacity: 0.7; }

  .result-panel {
    background: var(--ink);
    border-radius: 8px;
    padding: 22px 24px;
    margin-top: 4px;
    position: relative;
    overflow: hidden;
    min-height: 80px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .result-panel::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      -45deg, transparent, transparent 6px,
      rgba(255,255,255,0.012) 6px, rgba(255,255,255,0.012) 12px
    );
  }

  .result-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    position: relative;
    z-index: 1;
  }

  .result-label {
    font-size: 0.6rem;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: rgba(245,238,220,0.45);
  }

  .result-value {
    font-family: 'Playfair Display', serif;
    font-size: 1.9rem;
    font-weight: 900;
    color: var(--gold-light);
    line-height: 1;
    transition: all 0.3s;
  }

  .result-value.danger { color: var(--red); }
  .result-value.safe   { color: #5dca7a; }
  .result-value.neutral{ color: var(--cream); }

  .result-note {
    font-size: 0.68rem;
    color: rgba(245,238,220,0.45);
    letter-spacing: 0.5px;
    position: relative;
    z-index: 1;
    margin-top: -8px;
  }

  .prob-section { position: relative; z-index: 1; }

  .prob-bar-track {
    height: 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 999px;
    overflow: hidden;
    margin: 8px 0 6px;
  }

  .prob-bar-fill {
    height: 100%;
    border-radius: 999px;
    transition: width 0.6s cubic-bezier(0.34, 1.3, 0.64, 1), background 0.3s;
  }

  .prob-labels {
    display: flex;
    justify-content: space-between;
    font-size: 0.55rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(245,238,220,0.3);
  }

  .prob-pct {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem;
    font-weight: 900;
    text-align: center;
    letter-spacing: -1px;
    transition: color 0.3s, transform 0.3s;
  }

  .verdict {
    text-align: center;
    font-size: 0.72rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 4px;
    display: inline-block;
    position: relative;
    z-index: 1;
  }

  .verdict-wrap { display: flex; justify-content: center; position: relative; z-index: 1; }

  .verdict.very-likely { background: rgba(93,202,122,0.15); color: #5dca7a; }
  .verdict.likely      { background: rgba(93,202,122,0.1);  color: #a0ddb0; }
  .verdict.possible    { background: rgba(243,156,18,0.15); color: #f3b350; }
  .verdict.unlikely    { background: rgba(192,57,43,0.15);  color: #e87060; }
  .verdict.impossible  { background: rgba(192,57,43,0.25);  color: var(--red); }

  .empty-state {
    text-align: center;
    color: rgba(245,238,220,0.25);
    font-size: 0.75rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 10px 0;
    position: relative;
    z-index: 1;
  }

  .corner-pip {
    position: absolute;
    font-size: 0.75rem;
    color: rgba(245,238,220,0.08);
    font-family: 'Playfair Display', serif;
    font-weight: 900;
  }
  .pip-tl { top: 10px; left: 14px; }
  .pip-br { bottom: 10px; right: 14px; transform: rotate(180deg); }

  .formula-note {
    font-size: 0.6rem;
    color: rgba(26,58,42,0.4);
    text-align: center;
    letter-spacing: 1.5px;
    margin-top: 16px;
    line-height: 1.6;
  }

  .tag {
    display: inline-block;
    background: rgba(26,58,42,0.08);
    border: 1px solid rgba(26,58,42,0.12);
    border-radius: 3px;
    padding: 1px 5px;
    font-family: 'Courier Prime', monospace;
  }
</style>
</head>
<body>
<div class="table-cloth"></div>

<div class="card-wrapper">
  <div class="card">
    <div class="card-header">
      <div class="suits-row">
        <span>♠</span>
        <span class="red-suit">♥</span>
        <span class="red-suit">♦</span>
        <span>♣</span>
      </div>
      <h1>PINN<span>ACLE</span></h1>
      <div class="subtitle">Meld &amp; Bid Calculator</div>
    </div>

    <div class="card-body">
      <div class="field-group">
        <label>Team Meld Points</label>
        <div class="input-row">
          <div class="input-icon">♛</div>
          <input type="number" id="meld" min="0" placeholder="0" oninput="calculate()" />
        </div>
      </div>

      <div class="field-group">
        <label>Current Bid</label>
        <div class="input-row">
          <div class="input-icon">⇡</div>
          <input type="number" id="bid" min="0" placeholder="0" oninput="calculate()" />
        </div>
      </div>

      <div class="divider">
        <div class="divider-diamond">◆</div>
      </div>

      <div id="result-panel" class="result-panel">
        <span class="corner-pip pip-tl">A</span>
        <span class="corner-pip pip-br">A</span>
        <div class="empty-state">Enter meld &amp; bid above</div>
      </div>

      <div class="formula-note">
        Points needed = <span class="tag">bid − meld</span> &nbsp;·&nbsp;
        Probability based on typical trick scoring distribution
      </div>
    </div>
  </div>
</div>

<script>
  const TRICK_POINTS = 50;

  function calcProbability(needed) {
    if (needed <= 0) return 1.0;
    if (needed > TRICK_POINTS) return 0.0;

    const mean = 25, sd = 8;
    const z = (needed - mean) / sd;

    function normCDF(z) {
      const a1=0.254829592, a2=-0.284496736, a3=1.421413741,
            a4=-1.453152027, a5=1.061405429, p=0.3275911;
      const sign = z < 0 ? -1 : 1;
      const x = Math.abs(z) / Math.sqrt(2);
      const t = 1 / (1 + p * x);
      const y = 1 - (((((a5*t + a4)*t) + a3)*t + a2)*t + a1)*t * Math.exp(-x*x);
      return 0.5 * (1 + sign * y);
    }

    return Math.max(0, Math.min(1, 1 - normCDF(z)));
  }

  function getColor(pct) {
    if (pct >= 75) return '#5dca7a';
    if (pct >= 50) return '#b5d97a';
    if (pct >= 30) return '#f3b350';
    if (pct >= 15) return '#e87060';
    return '#c0392b';
  }

  function getVerdict(pct) {
    if (pct >= 75) return { cls: 'very-likely', text: 'Highly Likely' };
    if (pct >= 55) return { cls: 'likely',      text: 'Likely' };
    if (pct >= 35) return { cls: 'possible',    text: 'Possible' };
    if (pct >= 15) return { cls: 'unlikely',    text: 'Risky' };
    return               { cls: 'impossible',   text: 'Very Risky' };
  }

  function calculate() {
    const meld = parseFloat(document.getElementById('meld').value);
    const bid  = parseFloat(document.getElementById('bid').value);
    const panel = document.getElementById('result-panel');

    if (isNaN(meld) || isNaN(bid)) {
      panel.innerHTML = `
        <span class="corner-pip pip-tl">A</span>
        <span class="corner-pip pip-br">A</span>
        <div class="empty-state">Enter meld &amp; bid above</div>`;
      return;
    }

    const needed  = bid - meld;
    const prob    = calcProbability(needed);
    const pct     = Math.round(prob * 100);
    const color   = getColor(pct);
    const verdict = getVerdict(pct);
    const barPct  = Math.max(2, pct);

    let neededClass = 'neutral', neededNote = '';

    if (needed <= 0) {
      neededClass = 'safe';
      neededNote  = 'Meld alone covers the bid — tricks are a bonus!';
    } else if (needed > TRICK_POINTS) {
      neededClass = 'danger';
      neededNote  = `Bid is impossible — only ${TRICK_POINTS} trick pts available.`;
    } else {
      neededNote = `Must earn ${needed} of ${TRICK_POINTS} available trick points (${Math.round(needed/TRICK_POINTS*100)}% of tricks).`;
    }

    const neededDisplay = needed <= 0 ? '0 ✓' : needed > TRICK_POINTS ? `${needed}!` : needed;

    panel.innerHTML = `
      <span class="corner-pip pip-tl">A</span>
      <span class="corner-pip pip-br">A</span>

      <div class="result-row">
        <span class="result-label">Trick Points Needed</span>
        <span class="result-value ${neededClass}">${neededDisplay}</span>
      </div>
      <div class="result-note">${neededNote}</div>

      <div class="divider" style="margin:8px 0">
        <div style="flex:1;height:1px;background:rgba(255,255,255,0.08)"></div>
        <div style="color:rgba(201,168,76,0.3);font-size:0.7rem;padding:0 8px">◆</div>
        <div style="flex:1;height:1px;background:rgba(255,255,255,0.08)"></div>
      </div>

      <div class="prob-section">
        <div class="result-row">
          <span class="result-label">Probability of Keeping Meld</span>
        </div>
        <div style="text-align:center;position:relative;z-index:1;padding:4px 0">
          <div class="prob-pct" style="color:${color}">${pct}%</div>
        </div>
        <div class="prob-bar-track">
          <div class="prob-bar-fill" style="width:${barPct}%;background:${color};box-shadow:0 0 8px ${color}55"></div>
        </div>
        <div class="prob-labels">
          <span>Impossible</span>
          <span>Even</span>
          <span>Certain</span>
        </div>
      </div>

      <div class="verdict-wrap">
        <div class="verdict ${verdict.cls}">${verdict.text}</div>
      </div>
    `;
  }
</script>
</body>
</html>
